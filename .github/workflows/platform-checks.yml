name: Platform checks

on:
  pull_request:
  push:
    branches:
      - main
      - platforms
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli:
    name: CLI platform script tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test generated platform scripts
        run: cargo test -p fission-cli

  web:
    name: Web / wasm
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Check wasm core crates
        run: |
          cargo check -p fission-core --target wasm32-unknown-unknown
          cargo check -p fission-widgets --target wasm32-unknown-unknown
          cargo check -p fission-charts --target wasm32-unknown-unknown
          cargo check -p web-smoke --target wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Diagnose web toolchain
        run: cargo run -p fission-cli --bin fission -- doctor web --project-dir examples/web-smoke

      - name: Build web-smoke wasm package
        run: ./examples/web-smoke/platforms/web/build-wasm.sh

  android:
    name: Android package smoke
    runs-on: ubuntu-latest
    env:
      ANDROID_MIN_API_LEVEL: '24'
      ANDROID_TARGET_API_LEVEL: '35'
      ANDROID_BUILD_TOOLS_VERSION: '35.0.0'
      ANDROID_NDK_VERSION: '26.3.11579264'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_TARGET_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Diagnose Android toolchain
        run: cargo run -p fission-cli --bin fission -- doctor android --project-dir examples/mobile-smoke --strict

      - name: Check mobile-smoke for Android
        run: |
          export ANDROID_NDK="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          export ANDROID_TOOLCHAIN="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="$ANDROID_TOOLCHAIN/aarch64-linux-android${ANDROID_MIN_API_LEVEL}-clang"
          export AR_aarch64_linux_android="$ANDROID_TOOLCHAIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$CC_aarch64_linux_android"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_AR="$AR_aarch64_linux_android"
          cargo check -p mobile-smoke --target aarch64-linux-android

      - name: Package mobile-smoke APK
        run: |
          export ANDROID_NDK="$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION"
          ./platforms/android/package-apk.sh
        working-directory: examples/mobile-smoke

  ios:
    name: iOS simulator and device compile
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim,aarch64-apple-ios

      - name: Diagnose iOS toolchain
        run: cargo run -p fission-cli --bin fission -- doctor ios --project-dir examples/mobile-smoke --strict

      - name: Check mobile-smoke for iOS simulator
        run: cargo check -p mobile-smoke --target aarch64-apple-ios-sim

      - name: Check mobile-smoke for iOS device
        run: cargo check -p mobile-smoke --target aarch64-apple-ios

      - name: Package mobile-smoke simulator app
        run: ./platforms/ios/package-sim.sh
        working-directory: examples/mobile-smoke

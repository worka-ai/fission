name: Publish website

on:
  push:
    branches:
      - main
    paths:
      - 'documentation/**'
      - 'crates/**'
      - 'examples/chart-gallery/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/publish-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify static site dependency boundary
        run: |
          if cargo tree -p cargo-fission --target x86_64-unknown-linux-gnu -i libdbus-sys --locked | grep -q 'libdbus-sys'; then
            echo "Static site commands must not pull libdbus-sys through the Fission command dependency graph." >&2
            exit 1
          fi
          if cargo tree -p fission-command-site --locked | grep -E 'keyring|aws-sdk|dbus|secret-service'; then
            echo "fission-command-site must remain independent of credentials and provider SDKs." >&2
            exit 1
          fi

      - name: Check static site routes
        run: cargo run -p cargo-fission --bin fission -- site check --project-dir documentation --release

      - name: Package static site
        run: cargo run -p cargo-fission --bin fission -- package --project-dir documentation --target site --format static --release

      - name: Verify generated static site
        run: |
          test -f documentation/target/fission/release/site/static/index.html
          test -f documentation/target/fission/release/site/static/site.css
          test -f documentation/target/fission/release/site/static/sitemap.xml
          test -f documentation/target/fission/release/site/static/robots.txt
          test -f documentation/target/fission/release/site/static/search/search.js
          test -f documentation/target/fission/release/site/static/search/manifest.json
          test -f documentation/target/fission/release/site/static/search/docs.json
          test -f documentation/target/fission/release/site/static/img/fission-mark.svg
          test -f documentation/target/fission/release/site/static/img/charts/line-gradient-area.png
          test -f documentation/target/fission/release/site/static/artifact-manifest.json

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/target/fission/release/site/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

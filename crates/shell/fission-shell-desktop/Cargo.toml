[package]
name = "fission-shell-desktop"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/worka-ai/fission"
description = "Shell Desktop"

[dependencies]
fission-shell = { path = "../fission-shell", version = "0.1.0" }
fission-render = { path = "../../rendering/fission-render", version = "0.1.0" }
fission-render-vello = { path = "../../rendering/fission-render-vello" }
fission-core = { path = "../../core/fission-core", version = "0.1.0" }
fission-layout = { path = "../../core/fission-layout", version = "0.1.0" } 
fission-ir = { path = "../../core/fission-ir", version = "0.1.0" }
fission-semantics = { path = "../../core/fission-semantics", version = "0.1.0" }
fission-theme = { path = "../../core/fission-theme", version = "0.1.0" }
winit = "0.29.15"
arboard = "3.4"
fission-diagnostics = { path = "../../tools/fission-diagnostics", version = "0.1.0" }
fission-test-driver = { path = "../../tools/fission-test-driver" }
image = "0.25"
anyhow = "1.0"
raw-window-handle = "0.6"
bytemuck = "1.16"
serde_json = "1"
vello = "0.6.0"
pollster = "0.3"
fontique = "0.7"
serde = { version = "1.0", features = ["derive"] }

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"
cocoa = "0.25"
core-graphics = "0.23"

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
fission-macros = { path = "../../authoring/fission-macros", version = "0.1.0" }
fission-widgets = { path = "../../authoring/fission-widgets", version = "0.1.0" }
lazy_static = "1"

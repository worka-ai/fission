[package]
name = "fission-test"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/worka-ai/fission"
description = "Test"

[dependencies]
fission-core = { path = "../../core/fission-core", version = "0.1.0" }
fission-ir = { path = "../../core/fission-ir", version = "0.1.0" }
fission-layout = { path = "../../core/fission-layout", version = "0.1.0" }
fission-render = { path = "../../rendering/fission-render", version = "0.1.0" }
fission-shell = { path = "../../shell/fission-shell", version = "0.1.0" }
fission-widgets = { path = "../../authoring/fission-widgets", version = "0.1.0" }
fission-semantics = { path = "../../core/fission-semantics", version = "0.1.0" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
lazy_static = "1.4"
fission-macros = { path = "../../authoring/fission-macros", version = "0.1.0" }
fission-diagnostics = { version = "0.1.0", path = "../fission-diagnostics" }
fission-render-vello = { path = "../../rendering/fission-render-vello" }
fission-theme = { path = "../../core/fission-theme", version = "0.1.0" }
fontique = "0.7"
serde_json = "1.0"

[dev-dependencies]
fission-shell-desktop = { path = "../../shell/fission-shell-desktop" }

[package]
name = "fission-diagnostics"
version = "0.2.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/worka-ai/fission"
description = "Structured diagnostics and reporting primitives for Fission tools and runtime checks"

homepage = "https://fission.rs"
documentation = "https://fission.rs"
readme = "README.md"
[lib]
path = "src/lib.rs"

[features]
# When disabled, emission macros become near no-ops at runtime (still compiled).
# We can later make this a true compile-time gate across the workspace.
fission_diagnostics = []

[dependencies]
once_cell = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
bitflags = "2"

[package]
name = "fission-command-devtools"
version = "0.4.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/worka-ai/fission"
description = "Developer tooling commands for inspecting running Fission apps"
homepage = "https://fission.rs"
documentation = "https://fission.rs"
readme = "README.md"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
fission-devtools-protocol = { path = "../fission-devtools-protocol", version = "0.4.0" }
fission-test-driver = { path = "../fission-test-driver", version = "0.4.0" }
serde_json = "1.0"

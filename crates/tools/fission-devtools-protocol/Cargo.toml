[package]
name = "fission-devtools-protocol"
version = "0.4.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/worka-ai/fission"
description = "Versioned developer tooling protocol types for Fission runtime inspection and profiling"
homepage = "https://fission.rs"
documentation = "https://fission.rs"
readme = "README.md"

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
